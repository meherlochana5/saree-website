<!DOCTYPE html>
<html>
<head>
    <title>Login - SareeShop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .toggle-link { color: #ff9800; cursor: pointer; text-decoration: underline; font-weight: bold; }
        .cart-btn { background-color: #ff9800; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .cart-btn:hover { background-color: #e68a00; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="pass" placeholder="Password">

    <p class="toggle-link" onclick="forgotPass()" style="font-size: 0.8rem; margin-top: -5px;">Forgot Password?</p>

    <button class="cart-btn" onclick="handleLogin()" style="width: 100%;">Login</button>
    
    <p style="margin-top: 15px;">
        Don't have an account? <a href="signup.html" class="toggle-link">Signup here</a>
    </p>
</div>
<div id="otpBox" style="display:none; text-align:center; margin-top:20px;">
    <input id="otpInput" placeholder="Enter OTP">
    <button onclick="verifyOtp()">Verify OTP</button>
</div>

<div id="resetBox" style="display:none; text-align:center; margin-top:20px;">
    <input id="newPass" placeholder="Enter New Password">
    <button onclick="resetPassword()">Reset Password</button>
</div>

<script>
   
   
function handleLogin() {
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("pass").value.trim();

    if(!email || !pass) {
        showToast("Please fill all fields!");
        return;
    }

    // ADMIN LOGIN
  
    // USER LOGIN FROM DATABASE
    fetch("https://saree-website-zn6k.onrender.com/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, pass })
    })
    .then(res => {
        if(!res.ok) throw new Error();
        return res.json();
    })
    .then(user => {
    localStorage.removeItem("adminLoggedIn"); // ✅ ADD THIS

    localStorage.setItem("user", JSON.stringify(user));
    showToast("Login Successful! 🛍️");
    window.location.href = "index.html";
})
    .catch(() => {
        showToast("Invalid Email or Password ❌");
    });
}
let currentEmail = ""; // ✅ KEEP THIS

function forgotPass() {
    let email = document.getElementById("email").value;
    currentEmail = email;

    fetch("https://saree-website-zn6k.onrender.com/send-otp", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email })
    })
    .then(res => res.text())
    .then(msg => {
        console.log(msg);
        document.getElementById("otpBox").style.display = "block";
    })
    .catch(err => console.log(err));
}


function verifyOtp() {
    let otp = document.getElementById("otpInput").value;

    fetch("https://saree-website-zn6k.onrender.com/verify-otp", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email: currentEmail, otp })
    })
    .then(res => res.text())
    .then(msg => {
        document.getElementById("resetBox").style.display = "block";
    })
    .catch(err => console.log(err));
}

function resetPassword() {
    let newPass = document.getElementById("newPass").value;

    fetch("https://saree-website-zn6k.onrender.com/reset-password", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email: currentEmail, newPass })
    })
    .then(res => res.text())
    .then(msg => {
        alert("Password updated ✅");
        window.location.reload();
    })
    .catch(err => console.log(err));
}
</script>
<div id="toast"></div>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="nav-left"><h2>🛍 SareeShop Admin</h2></div>
</nav>

<div class="center-box">
    <h2>Admin Login</h2>

    <input id="adminEmail" placeholder="Admin Email">
    <input id="adminPass" type="password" placeholder="Password">

    <button onclick="adminLogin()">Login</button>
</div>

<script>
function adminLogin(){
    let email = document.getElementById("adminEmail").value;
    let pass = document.getElementById("adminPass").value;

    fetch("https://saree-website-zn6k.onrender.com/admin-login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, pass })
    })
    .then(res => {
        if(!res.ok) throw new Error();
        return res.json();
    })
    .then(() => {
        localStorage.setItem("adminLoggedIn", "true");
        localStorage.removeItem("user");

        showToast("Admin Login Success ✅");
        window.location.href = "admin.html";
    })
    .catch(() => {
        showToast("Wrong Admin Credentials ❌");
    });
}
</script>
<div id="toast"></div>
</body>
</html>
